<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/plans">💪 WorkoutApp</a>
  </div>

  <div class="navbar-links">
    <a routerLink="/plans" routerLinkActive="active">Plans</a>
    <a routerLink="/progress" routerLinkActive="active">Progress</a>
    <a routerLink="/exercises" routerLinkActive="active">Exercises</a>
    <a routerLink="/profile" routerLinkActive="active">Profile</a>

    @if (isAdmin()) {
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-admin">
        👥 Users
      </a>
    }

  </div>

  <div class="navbar-actions">

    @if (role() !== 'USER') {
      <span class="role-badge role-{{ role() | lowercase }}">
        {{ role() }}
      </span>
    }

    <button class="theme-toggle" (click)="toggleTheme()">
      <div class="theme-toggle-track" [class.active]="isDarkTheme()">
        <div class="theme-toggle-thumb"></div>
      </div>
      <span class="theme-toggle-icon">{{ isDarkTheme() ? '☀️' : '🌙' }}</span>
    </button>
    <button (click)="logout()" class="btn-logout">Logout</button>
  </div>
</nav>
